# Automatically set window title
setw -g automatic-rename on
set -g allow-rename on

# Use vi keys throughout because I don't remember emacs
set -g status-keys vi
set -g mode-keys vi

# advertise 256-color + RGB
set -g default-terminal "tmux-256color"

# truecolor passthrough
set -as terminal-overrides ",*:Tc"

# Make Escape-based key chords feel snappy (vi mode, vim/neovim, etc.)
set -sg escape-time 10

# Forward focus events to apps that care (vim, fzf, etc.)
set -g focus-events on

# Tip: hold Shift to use your terminal's native selection instead of tmux copy-mode
set -g mouse on

setw -g aggressive-resize off
